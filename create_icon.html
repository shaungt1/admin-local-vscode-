<!DOCTYPE html>
<html>
<head>
    <title>Admin Local Icon Generator</title>
</head>
<body style="margin: 0; background: #000;">
    <canvas id="canvas" width="512" height="512"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const size = 512;
        const center = size / 2;

        // Black background
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, size, size);

        // Create radial gradient for outer glow
        const outerGlow = ctx.createRadialGradient(center, center, 0, center, center, center * 1.2);
        outerGlow.addColorStop(0, 'rgba(138, 43, 226, 0.4)');  // Purple center
        outerGlow.addColorStop(0.3, 'rgba(0, 191, 255, 0.3)'); // Blue
        outerGlow.addColorStop(0.6, 'rgba(0, 255, 127, 0.2)'); // Green
        outerGlow.addColorStop(1, 'rgba(0, 0, 0, 0)');

        ctx.fillStyle = outerGlow;
        ctx.fillRect(0, 0, size, size);

        // Main circle with gradient
        const mainGradient = ctx.createLinearGradient(0, 0, size, size);
        mainGradient.addColorStop(0, '#9333ea');    // Purple
        mainGradient.addColorStop(0.5, '#3b82f6');  // Blue
        mainGradient.addColorStop(1, '#10b981');    // Green

        ctx.beginPath();
        ctx.arc(center, center, size * 0.35, 0, Math.PI * 2);
        ctx.strokeStyle = mainGradient;
        ctx.lineWidth = 20;
        ctx.stroke();

        // Inner glow
        const innerGlow = ctx.createRadialGradient(center, center, size * 0.25, center, center, size * 0.35);
        innerGlow.addColorStop(0, 'rgba(147, 51, 234, 0.3)');
        innerGlow.addColorStop(1, 'rgba(16, 185, 129, 0.1)');
        ctx.fillStyle = innerGlow;
        ctx.fill();

        // Lock symbol in center
        ctx.save();
        ctx.translate(center, center);
        
        // Lock body
        const lockWidth = size * 0.15;
        const lockHeight = size * 0.18;
        const lockX = -lockWidth / 2;
        const lockY = size * 0.02;
        
        const lockGradient = ctx.createLinearGradient(lockX, lockY, lockX + lockWidth, lockY + lockHeight);
        lockGradient.addColorStop(0, '#ffffff');
        lockGradient.addColorStop(1, '#e0e0e0');
        
        ctx.fillStyle = lockGradient;
        ctx.fillRect(lockX, lockY, lockWidth, lockHeight);
        
        // Lock shackle
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = size * 0.025;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.arc(0, lockY, lockWidth * 0.3, Math.PI, 0, false);
        ctx.stroke();
        
        // Keyhole
        ctx.fillStyle = '#333333';
        ctx.beginPath();
        ctx.arc(0, lockY + lockHeight * 0.35, lockWidth * 0.12, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillRect(-lockWidth * 0.06, lockY + lockHeight * 0.35, lockWidth * 0.12, lockHeight * 0.3);
        
        ctx.restore();

        // Download as PNG
        setTimeout(() => {
            canvas.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'icon-512.png';
                a.click();
                console.log('Icon generated! Check your downloads folder.');
            });
        }, 100);
    </script>
</body>
</html>
